<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão 360 Domidona - Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Cabeçalho Principal (Oculto na impressão) -->
    <header class="top-bar no-print">
        <div class="logo">
            <h1>Gestão 360 Domidona</h1>
            <span class="subtitle">Módulo de Pedidos de Compra</span>
        </div>
        <button id="btn-print-all" class="btn-primary">🖨️ IMPRIMIR TODOS VISÍVEIS</button>
    </header>

    <!-- Barra de Ferramentas: Pesquisa e Categorias (Oculto na impressão) -->
    <section class="toolbar no-print">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Pesquisar por SKU ou Nome da referência...">
        </div>
        
        <!-- As abas serão injetadas aqui pelo JavaScript -->
        <div class="category-tabs" id="category-tabs"></div>
    </section>

    <!-- Cabeçalho exclusivo para Impressão -->
    <div class="print-header only-print">
        <h1>Pedido de Compra - Domidona</h1>
        <p>Data de emissão: <span id="print-date"></span></p>
    </div>

    <!-- Container Principal -->
    <main>
        <!-- Resumo Geral -->
        <section class="summary-section">
            <p>Total Geral Selecionado: <strong id="grand-total">0</strong> pares</p>
        </section>

        <!-- Container onde os SKUs serão renderizados -->
        <section id="skus-container" class="skus-grid">
            <!-- Os cartões de SKU serão injetados aqui -->
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
